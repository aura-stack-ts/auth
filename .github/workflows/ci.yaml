name: CI

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "configs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "configs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  node:
    name: Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:prod

      - name: Run type checks
        run: pnpm type-check --filter=./packages/*

      - name: Run tests
        run: pnpm test
