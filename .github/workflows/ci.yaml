name: CI

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "configs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "deno.lock"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "configs/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "bun.lock"
      - "deno.lock"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    name: Node.js
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:prod

      - name: Run type checks
        run: pnpm type-check

      - name: Run tests
        run: pnpm test

  deno:
    name: Deno
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Build packages
        run: deno task build:prod

      - name: Run type checks
        run: deno task type-check

      - name: Run tests
        run: deno task test

  bun:
    name: Bun
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:prod

      - name: Run type checks
        run: bun run type-check

      - name: Run tests
        run: bun run test
